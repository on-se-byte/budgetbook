<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <title></title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #f2f4f7;
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #ddd;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #4a90e2;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .combo {
            position: relative;
        }

        .combo-list {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            width: 100%;
            z-index: 10;
        }

        .combo-list .option {
            padding: 8px;
            cursor: pointer;
        }

        .combo-list .option:hover {
            background: #eee;
        }

        #addBtn {
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .total-area {
            margin-top: 20px;
            text-align: center;
        }

        #totalAmount {
            font-size: 30px;
            font-weight: bold;
            margin-top: 8px;
            transition: transform 0.2s ease;
        }

        .list-area ul {
            list-style: none;
            padding: 0;
        }

        .list-area li {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fixed-item {
            background-color: #e6e6e6 !important;
        }

        .variable-item {
            background-color: #ffffff !important;
        }

        .actions button {
            margin-left: 6px;
        }

        .edit-area {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .edit-area input {
            flex: 1;
            padding: 6px;
        }

        #totalAmount {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            text-align: center;
        }

        #shareText {
            width: 100%;
            height: 180px;
            margin-top: 20px;
            padding: 10px;
            background: #fff;
            border-radius: 6px;
            white-space: pre-wrap;
        }

        #copyBtn {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <h1></h1>
    </header>

    <main>

        <div class="tabs">
            <button id="tabVariable" class="tab-btn active">家計支出リスト</button>
            <button id="tabFixed" class="tab-btn">固定費編集</button>
        </div>

        <!-- 変動費タブ -->
        <div id="variableTab" class="tab-content active">
            <section class="input-area">
                <div class="combo">
                    <input type="text" id="itemName" placeholder="項目名（自由入力OK）">
                    <div class="combo-list" id="comboList">
                        <div class="option">ガス代</div>
                        <div class="option">電気代</div>
                        <div class="option">水道代</div>
                        <div class="option">食費</div>
                    </div>
                </div>
                <input id="itemAmount" type="number" placeholder="金額">
                <button id="addBtn">追加</button>
            </section>

            <section class="total-area">
                <p>合計金額</p>
                <div id="totalAmount">0 円</div>
            </section>

            <div class="list-area">
                <ul id="itemList"></ul>
            </div>

            <textarea id="shareText" readonly></textarea>
            <button id="copyBtn">コピーする</button>
        </div>

        <!-- 固定費タブ -->
        <div id="fixedTab" class="tab-content">
            <div class="input-area">
                <input id="fixedName" type="text" placeholder="固定費名">
                <input id="fixedAmount" type="number" placeholder="金額">
                <button id="fixedAddBtn">追加</button>
            </div>
            <div class="list-area">
                <ul id="fixedList"></ul>
            </div>
        </div>

    </main>

    <!-- Firebase SDK（compat版） -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        /* Firebase 設定（budgetbook-202603） */
        const firebaseConfig = {
            apiKey: "AIzaSyCwnHl8gFx8ctkpJ8m_HZOw-dGkSMdIf8M",
            authDomain: "budgetbook-202603.firebaseapp.com",
            projectId: "budgetbook-202603",
            storageBucket: "budgetbook-202603.firebasestorage.app",
            messagingSenderId: "1016406574750",
            appId: "1:1016406574750:web:c27a0b3ada3f4496a99d8f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
    </script>

    <script>
        /* ------------------------------
           Firestore 参照
        ------------------------------ */
        const params = new URLSearchParams(location.search);
        const roomId = params.get("id") || "default";

        // roomId = "2026-03" のような形式
        const [year, month] = roomId.split("-");
        // 書き換え
        document.querySelector("header h1").textContent =
            `${year}年${month}月家計簿`;
        document.title = `${year}年${month}月家計簿`;

        const fixedDoc = db.collection("households").doc("fixed");
        const variableDoc = db.collection("rooms").doc(roomId);

        let fixedItems = [];
        let variableItems = [];

        /* ------------------------------
           タブ切り替え
        ------------------------------ */
        const tabFixedBtn = document.getElementById("tabFixed");
        const tabVariableBtn = document.getElementById("tabVariable");
        const fixedTab = document.getElementById("fixedTab");
        const variableTab = document.getElementById("variableTab");

        function switchTab(tab) {
            if (tab === "fixed") {
                tabFixedBtn.classList.add("active");
                tabVariableBtn.classList.remove("active");
                fixedTab.classList.add("active");
                variableTab.classList.remove("active");
            } else {
                tabFixedBtn.classList.remove("active");
                tabVariableBtn.classList.add("active");
                fixedTab.classList.remove("active");
                variableTab.classList.add("active");
            }
        }

        tabFixedBtn.onclick = () => switchTab("fixed");
        tabVariableBtn.onclick = () => switchTab("variable");

        /* ------------------------------
           初期読み込み
        ------------------------------ */
        async function loadData() {
            const fixedSnap = await fixedDoc.get();
            if (fixedSnap.exists) {
                fixedItems = fixedSnap.data().fixedItems;
            } else {
                fixedItems = [
                    { name: "住宅ローン", amount: 85000 },
                    { name: "Wi-Fi", amount: 5500 },
                    { name: "保険料", amount: 20000 },
                    { name: "Apple", amount: 1980 },
                    { name: "アマプラ", amount: 500 },
                    { name: "Netflix", amount: 1000 }
                ];
                await fixedDoc.set({ fixedItems });
            }

            const variableSnap = await variableDoc.get();
            variableItems = variableSnap.exists ? variableSnap.data().variableItems : [];
            renderFixed();
            renderVariable();
        }

        window.onload = loadData;

        /* ------------------------------
            コンボボックス（候補表示）
        ------------------------------ */
        const itemNameInput = document.getElementById("itemName");
        const comboList = document.getElementById("comboList");

        // フォーカスしたら候補を表示
        itemNameInput.addEventListener("focus", () => {
            comboList.style.display = "block";
        });

        // 候補をクリックしたら入力欄に反映
        comboList.addEventListener("mousedown", (e) => {
            if (e.target.classList.contains("option")) {
                itemNameInput.value = e.target.textContent;
            }
        });

        // フォーカスが外れたら候補を閉じる
        itemNameInput.addEventListener("blur", () => {
            setTimeout(() => comboList.style.display = "none", 100);
        });

        /* ------------------------------
           固定費描画
        ------------------------------ */
        const fixedList = document.getElementById("fixedList");

        function renderFixed() {
            fixedList.innerHTML = "";
            fixedItems.forEach((item, idx) => {
                const li = document.createElement("li");
                li.classList.add("fixed-item");
                li.dataset.index = idx;
                li.innerHTML = `
        <span>${item.name}：${item.amount.toLocaleString()} 円</span>
        <span class="actions">
          <button class="editBtn">編集</button>
          <button class="deleteBtn">削除</button>
        </span>
      `;
                fixedList.appendChild(li);
            });
        }

        /* ------------------------------
        固定費追加
        ------------------------------ */
        document.getElementById("fixedAddBtn").onclick = async () => {
            const name = document.getElementById("fixedName").value.trim();
            const amount = Number(document.getElementById("fixedAmount").value);

            if (!name || !amount) return;

            fixedItems.push({ name, amount });
            await saveFixed();
            renderFixed();

            document.getElementById("fixedName").value = "";
            document.getElementById("fixedAmount").value = "";
        };


        /* ------------------------------
           変動費描画
        ------------------------------ */
        const itemList = document.getElementById("itemList");

        function renderVariable() {
            itemList.innerHTML = "";
            variableItems.forEach((item, idx) => {
                const li = document.createElement("li");
                li.classList.add("variable-item");
                li.dataset.index = idx;
                li.innerHTML = `
        <span>${item.name}：${item.amount.toLocaleString()} 円</span>
        <span class="actions">
          <button class="editBtn">編集</button>
          <button class="deleteBtn">削除</button>
        </span>
      `;
                itemList.appendChild(li);
            });

            recalcTotal();
            updateShareText();
        }

        /* ------------------------------
           Firestore 保存
        ------------------------------ */
        function saveFixed() {
            return fixedDoc.set({ fixedItems });
        }

        function saveVariable() {
            return variableDoc.set({ variableItems });
        }

        /* ------------------------------
           変動費追加
        ------------------------------ */
        document.getElementById("addBtn").onclick = async () => {
            const name = document.getElementById("itemName").value.trim();
            const amount = Number(document.getElementById("itemAmount").value);

            if (!name || !amount) return;

            variableItems.push({ name, amount });
            await saveVariable();
            renderVariable();

            document.getElementById("itemName").value = "";
            document.getElementById("itemAmount").value = "";
        };

        /* ------------------------------
           固定費 編集・削除
        ------------------------------ */
        fixedList.onclick = async (e) => {
            const li = e.target.closest("li");
            if (!li) return;

            const index = Number(li.dataset.index);
            const item = fixedItems[index];

            if (e.target.classList.contains("editBtn")) {
                li.innerHTML = `
        <div class="edit-area">
          <input type="text" class="editName" value="${item.name}">
          <input type="number" class="editAmount" value="${item.amount}">
        </div>
      `;

                const editArea = li.querySelector(".edit-area");
                const nameInput = li.querySelector(".editName");
                const amountInput = li.querySelector(".editAmount");

                amountInput.focus();
                amountInput.select();

                const saveEdit = async () => {
                    item.name = nameInput.value;
                    item.amount = Number(amountInput.value);
                    await saveFixed();
                    renderFixed();
                };

                // Enterキーで保存
                nameInput.addEventListener("keydown", (ev) => {
                    if (ev.key === "Enter") saveEdit();
                });
                amountInput.addEventListener("keydown", (ev) => {
                    if (ev.key === "Enter") saveEdit();
                });

                // 編集エリア全体からフォーカスが外れたら保存
                editArea.addEventListener("focusout", (ev) => {
                    // 編集エリア内の要素にフォーカスが移動した場合は保存しない
                    if (editArea.contains(ev.relatedTarget)) return;

                    saveEdit();
                });

                return;
            }

            if (e.target.classList.contains("deleteBtn")) {
                fixedItems.splice(index, 1);
                await saveFixed();
                renderFixed();
            }
        };

        /* ------------------------------
           変動費 編集・削除
        ------------------------------ */
        itemList.onclick = async (e) => {
            const li = e.target.closest("li");
            if (!li) return;

            const index = Number(li.dataset.index);
            const item = variableItems[index];

            if (e.target.classList.contains("editBtn")) {
                li.innerHTML = `
        <div class="edit-area">
          <input type="text" class="editName" value="${item.name}">
          <input type="number" class="editAmount" value="${item.amount}">
        </div>
      `;

                const editArea = li.querySelector(".edit-area");
                const nameInput = li.querySelector(".editName");
                const amountInput = li.querySelector(".editAmount");

                amountInput.focus();
                amountInput.select();

                const saveEdit = async () => {
                    item.name = nameInput.value;
                    item.amount = Number(amountInput.value);
                    await saveVariable();
                    renderVariable();
                };

                // Enterキーで保存
                nameInput.addEventListener("keydown", (ev) => {
                    if (ev.key === "Enter") saveEdit();
                });
                amountInput.addEventListener("keydown", (ev) => {
                    if (ev.key === "Enter") saveEdit();
                });

                // 編集エリア全体からフォーカスが外れたら保存
                editArea.addEventListener("focusout", (ev) => {
                    // 編集エリア内の要素にフォーカスが移動した場合は保存しない
                    if (editArea.contains(ev.relatedTarget)) return;

                    saveEdit();
                });

                return;
            }

            if (e.target.classList.contains("deleteBtn")) {
                variableItems.splice(index, 1);
                await saveVariable();
                renderVariable();
            }
        };

        /* ------------------------------
           合計
        ------------------------------ */
        function recalcTotal() {
            const total = [...variableItems, ...fixedItems]
                .reduce((sum, item) => sum + item.amount, 0);

            document.getElementById("totalAmount").textContent =
                `${total.toLocaleString()} 円`;
        }

        /* ------------------------------
           共有テキスト
        ------------------------------ */
        function updateShareText() {
            const [year, month] = roomId.split("-");

            let text = `【${year}年${month}月の家計簿まとめ】\n`;
            text += "-------------------------\n";

            text += "~~変動費~~\n";
            if (variableItems.length === 0) {
                text += "（なし）\n";
            } else {
                variableItems.forEach(i => {
                    text += `${i.name}：${i.amount.toLocaleString()}円\n`;
                });
            }

            text += "\n~~固定費~~\n";
            fixedItems.forEach(i => {
                text += `${i.name}：${i.amount.toLocaleString()}円\n`;
            });

            text += "-------------------------\n";

            const total = [...variableItems, ...fixedItems]
                .reduce((sum, item) => sum + item.amount, 0);

            text += `合計：${total.toLocaleString()}円`;

            document.getElementById("shareText").value = text;
        }

        /* ------------------------------
        // コピー
        ------------------------------ */
        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(shareText.value)
                .then(() => {
                    copyBtn.textContent = "コピーしました！";
                    setTimeout(() => {
                        copyBtn.textContent = "コピーする";
                    }, 1500);
                });
        });
    </script>

</body>

</html>
