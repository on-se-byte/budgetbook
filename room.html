<link rel="stylesheet" href="room.css">

<div class="layout">

    <nav class="sidebar" id="sidebar">
        <ul>
            <li data-page="home">ホーム</li>

            <li class="section">収入</li>
            <li data-page="income-list" class="child">収入リスト</li>
            <li data-page="saving-edit" class="child">貯金額編集</li>

            <li class="section">支出</li>
            <li data-page="expense-list" class="child">家計支出リスト</li>
            <li data-page="fixed-edit" class="child">固定費編集</li>
        </ul>
    </nav>

    <main class="content">
        <div id="page-home" class="page">ホーム画面</div>
        <div id="page-income-list" class="page">収入リスト</div>


        <!-- 貯金額編集タブ -->
        <div id="page-saving-edit" class="page">
            <h2 class="page-title">貯金額編集</h2>
            <div id="savingTab" class="tab-content">
                <div class="input-area">
                    <input id="savingName" type="text" placeholder="貯金項目">
                    <input id="savingAmount" type="number" placeholder="金額">
                    <button id="savingAddBtn">追加</button>
                </div>
                <div class="list-area">
                    <ul id="savingList"></ul>
                </div>
            </div>
        </div>


        <!-- 家計支出リストタブ -->
        <div id="page-expense-list" class="page">
            <h2 class="page-title">家計支出リスト</h2>
            <div id="variableTab" class="tab-content active">
                <section class="input-area">
                    <div class="combo">
                        <input type="text" id="itemName" placeholder="項目名（自由入力OK）">
                        <div class="combo-list" id="comboList">
                            <div class="option">ガス代</div>
                            <div class="option">電気代</div>
                            <div class="option">水道代</div>
                            <div class="option">食費</div>
                        </div>
                    </div>
                    <input id="itemAmount" type="number" placeholder="金額">
                    <button id="addBtn">追加</button>
                </section>

                <section class="total-area">
                    <p>合計金額</p>
                    <div id="totalAmount">0 円</div>
                </section>

                <div class="list-area">
                    <ul id="itemList"></ul>
                </div>

                <h3 class="shareH3">共有用テキスト</h3>
                <textarea id="shareText" readonly></textarea>
                <button id="copyBtn">コピーする</button>

            </div>
        </div>



        <!-- 固定費編集タブ -->
        <div id="page-fixed-edit" class="page">
            <h2 class="page-title">固定費編集</h2>
            <div id="fixedTab" class="tab-content">
                <div class="input-area">
                    <input id="fixedName" type="text" placeholder="固定費項目">
                    <input id="fixedAmount" type="number" placeholder="金額">
                    <button id="fixedAddBtn">追加</button>
                </div>
                <div class="list-area">
                    <ul id="fixedList"></ul>
                </div>
            </div>
        </div>
    </main>

    <button id="toggleSidebar" class="toggle-btn">≡</button>
</div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="room.js"></script>
</body>

</html>
